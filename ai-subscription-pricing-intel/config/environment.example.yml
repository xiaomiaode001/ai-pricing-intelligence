python:
  minimum_version: "3.10"
  recommended_version: "3.12"
  recommended_command: "python -X utf8"
  optional_env:
    PYTHONUTF8: "1"

dependencies:
  install_command: "python -m pip install -r requirements.txt"
  required_for_validation:
    - PyYAML

network:
  required_for_today_capture: true
  optional_for_local_snapshot: false
  allow_hosts:
    - appstoreprice.org
    - apps.apple.com
    - api.frankfurter.dev
    - frankfurter.app
    - open.er-api.com

runtime_dirs:
  - data/raw/appstoreprice
  - data/normalized
  - data/snapshots
  - data/fx
  - outputs

retention:
  config_path: config/retention.yml
  default_retention_days: 14
  retain_minimum_per_product: 2

validation:
  environment_check: "python -X utf8 scripts/check_environment.py"
  strict_environment_check: "python -X utf8 scripts/check_environment.py --strict"
  skill_validate: "python -X utf8 <quick_validate.py> ."
