name: Feature request
description: Suggest a product route, report field, validation rule, or workflow improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What monitoring or reporting gap should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Product routing
        - App Store Price parsing
        - FX recomputation
        - Apple spotcheck
        - Report output
        - Retention cleanup
        - Documentation
  - type: textarea
    id: notes
    attributes:
      label: Notes
