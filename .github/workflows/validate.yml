name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-subscription-pricing-intel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Check environment
        run: python -X utf8 scripts/check_environment.py --strict

      - name: Check release readiness
        run: python -X utf8 scripts/check_release_readiness.py --project-root "$GITHUB_WORKSPACE" --strict

      - name: Compile scripts
        run: python -X utf8 -m compileall scripts

      - name: Run tests
        run: python -X utf8 -m unittest discover -s tests
